name: pages

# 稽核證據索引頁 → GitHub Pages（live 警報數 + 原生證據連結 + 控制→NIST SSDF 對照）。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: read   # 讀 code scanning / dependabot 警報數
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 產稽核證據索引
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/audit-evidence.sh
          ./scripts/audit-evidence.sh public
      - uses: actions/upload-pages-artifact@v3
        with: { path: public }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
