name: release-promote

# T2.5 自動化(ADO-free,GitHub Actions 版)— 讓 L4「右側部署治理鏈」真的 fire,
# 不只是 deploy-governance/ 的 script + self-test。本 workflow 在一次 run 內:
#   build → 簽章 → 產 ReleaseManifest(可帶變更治理欄位)
#   → 變更分類閘門(fail-closed)→ seed test-feed → 登錄 CMDB
#   → build-once promote test → uat → prod(每區重新驗章;prod 需 CAB 核可)
#   → 發佈漂移對帳(CMDB 期望 vs 發佈庫實際)→ 上傳端到端證據。
# 「build once, promote the same artifact」:同一 digest 逐區晉級,環境差異只在 feed。
#
# 觸發:手動 workflow_dispatch(可由 supply-chain build 後的 repository_dispatch 串接,見 T2.5 後續)。
# 對應治理控制項:ISO 27001 A.8.28 完整性 / A.8.32 變更管理 / A.5.36 合規審查;ISO 20000 發布與部署。

on:
  workflow_dispatch:
    inputs:
      approved_by:
        description: "正式區(prod)CAB 核可人(空 = prod 晉級被 fail-closed 擋下)"
        required: false
        default: ""
      change_type:
        description: "變更型別"
        required: true
        default: standard
        type: choice
        options: [standard, normal, emergency, retroactive]
      justification:
        description: "例外理由(emergency / retroactive 必填)"
        required: false
        default: ""
      pir_owner:
        description: "PIR 負責人(emergency / retroactive 必填)"
        required: false
        default: ""
      pir_due:
        description: "PIR 到期日 YYYY-MM-DD(emergency / retroactive 必填)"
        required: false
        default: ""
      nonconformity:
        description: "關聯不符合事項 / 漂移單(retroactive 必填,補單≠漂白)"
        required: false
        default: ""

permissions:
  contents: read

env:
  APP: supply-chain-backend
  COMPONENT: backend
  ORDER: test,uat,prod
  COSIGN_PASSWORD: ""

jobs:
  promote:
    name: build-once-promote-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 裝 Java 21
        uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - name: 裝 PyYAML / syft
        run: |
          pip install --quiet pyyaml
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - uses: sigstore/cosign-installer@v3

      - name: Build war + 跑測試
        run: mvn -B -f backend/pom.xml package

      - name: SBOM(Syft → CycloneDX)
        run: syft backend/target/liberty-backend.war -o cyclonedx-json=sbom-backend.json

      - name: Scan(Trivy fs → JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/target/liberty-backend.war
          format: json
          output: trivy-backend.json
          severity: HIGH,CRITICAL

      - name: 掃描判定(scan_verdict.py)
        run: python3 deploy-governance/scan_verdict.py --in trivy-backend.json --out scan-verdict-backend.json

      - name: 簽章(cosign sign-blob,臨時信任根)
        run: |
          cosign generate-key-pair --output-key-prefix ci
          cosign sign-blob --key ci.key --yes \
            --output-signature backend/target/liberty-backend.war.sig \
            backend/target/liberty-backend.war

      - name: Seed test-feed(把已簽 artifact + 證據放進發佈庫 test 區,manifest 帶變更治理欄位)
        run: |
          set -euo pipefail
          NAME="${APP}-${COMPONENT}"
          SEED="release-store/test/${NAME}"
          mkdir -p "$SEED"
          # build once:artifact / 簽章 / 證據以 basename 平放進 feed(promote 逐區搬同一份)
          cp backend/target/liberty-backend.war      "$SEED/liberty-backend.war"
          cp backend/target/liberty-backend.war.sig  "$SEED/liberty-backend.war.sig"
          cp sbom-backend.json                        "$SEED/sbom-backend.json"
          cp scan-verdict-backend.json                "$SEED/scan-verdict-backend.json"
          SUREFIRE="$(pwd)/backend/target/surefire-reports"
          ( cd "$SEED" && python3 "$GITHUB_WORKSPACE/deploy-governance/emit_manifest.py" \
              --app "$APP" --component "$COMPONENT" --ecosystem java \
              --artifact liberty-backend.war --coordinates com.example:liberty-backend:1.0.0 \
              --signature liberty-backend.war.sig --mode key-pair \
              --sbom sbom-backend.json --scan-verdict scan-verdict-backend.json \
              --surefire-dir "$SUREFIRE" --environment test \
              --change-type   "${{ inputs.change_type }}" \
              --justification "${{ inputs.justification }}" \
              --pir-owner     "${{ inputs.pir_owner }}" \
              --pir-due       "${{ inputs.pir_due }}" \
              --nonconformity "${{ inputs.nonconformity }}" \
              --out release.yaml )

      - name: 變更分類閘門(fail-closed;急件/補單缺理由或 PIR、或帶繞過旗標 → 擋)
        run: python3 deploy-governance/validate_change_class.py --path release-store

      - name: test 區自身驗章 + 登錄 CMDB
        run: |
          set -euo pipefail
          NAME="${APP}-${COMPONENT}"
          SEED="release-store/test/${NAME}"
          python3 deploy-governance/verify_release.py --manifest "$SEED/release.yaml" --pubkey ci.pub --root "$SEED"
          python3 deploy-governance/cmdb_register.py  --manifest "$SEED/release.yaml" \
            --cmdb-dir cmdb --verified-at "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: build-once promote — test → uat(逐區重新驗章)
        run: |
          python3 deploy-governance/promote.py --app "$APP" --component "$COMPONENT" \
            --from test --to uat --store release-store --order "$ORDER" --pubkey ci.pub --cmdb-dir cmdb

      - name: build-once promote — uat → prod(正式區需 CAB 核可)
        run: |
          python3 deploy-governance/promote.py --app "$APP" --component "$COMPONENT" \
            --from uat --to prod --store release-store --order "$ORDER" --pubkey ci.pub --cmdb-dir cmdb \
            --approved-by "${{ inputs.approved_by }}"

      # 註:各區證據物證存在由 verify_release 在 seed + 每次 promote 重新驗章時逐區驗過
      # (cmdb_validate 是 Tier1 平根模型,不適用多區 feed 佈局);CMDB↔feed 一致性由下方 reconcile 把關。
      - name: 發佈漂移對帳(CMDB 期望態 vs 發佈庫實際態)
        run: |
          python3 deploy-governance/reconcile_release.py \
            --cmdb-dir cmdb --store release-store --root release-store --order "$ORDER"

      - name: 上傳端到端證據(三區 feed + CMDB)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-evidence
          path: |
            release-store/**
            cmdb/**
