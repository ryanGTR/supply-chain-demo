name: supply-chain

# 供應鏈安全黃金管線（GitHub Actions 版，移植自 GitLab 版 supply-chain-demo）
#   SAST(Semgrep) · Secret(Gitleaks) · Build→GHCR · SBOM(Syft/CycloneDX) ·
#   Scan(Trivy) · 簽章 + attestation(cosign keyless via OIDC)
#   掃描結果(SARIF)上傳 GitHub code scanning（Security tab）。
# v1：GitHub 原生（hosted runner、image 推 GHCR、不接本機 Nexus/DTrack）。

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write          # 推 image 到 GHCR
  id-token: write          # cosign keyless（Sigstore OIDC）+ build provenance
  security-events: write   # 上傳 SARIF 到 code scanning
  attestations: write      # GitHub artifact attestations（SLSA build provenance）

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ───────────────── SAST ─────────────────
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep（產 SARIF）
        run: |
          # 拉 image 加重試，避開 registry 逾時 flake（之前 || true 會把拉失敗吃成假成功）
          for i in 1 2 3; do docker pull semgrep/semgrep && break || { echo "pull 第 $i 次失敗，重試…"; sleep 10; }; done
          set +e
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep \
            semgrep scan --config auto --sarif --output semgrep.sarif .
          rc=$?
          set -e
          # exit 0=無發現 / 1=有發現（交給 Gate 判）；≥2=Semgrep 真錯（含 image 拉不到）→ fail
          [ "$rc" -le 1 ] || { echo "✗ Semgrep 執行錯誤 (exit $rc)"; exit 1; }
          # 確保 SARIF 真的產出（拉失敗/崩潰時不會有，避免靜默放行）
          [ -s semgrep.sarif ] || { echo "✗ 沒產出 semgrep.sarif（掃描未成功）"; exit 1; }
      - name: 上傳 SARIF → code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: semgrep.sarif, category: semgrep }
      - name: Gate（ERROR 等級 → fail）
        run: |
          ERR=$(jq '[.runs[].results[]? | select(.level=="error")] | length' semgrep.sarif)
          echo "Semgrep error-level findings: $ERR"
          [ "$ERR" -eq 0 ] || { echo '✗ SAST gate FAIL'; exit 1; }

  # ───────────────── Secret scan ─────────────────
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks（產 SARIF）
        id: gl
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact \
            --report-format=sarif --report-path=/repo/gitleaks.sarif \
            --exit-code=1 && echo "hit=0" >> "$GITHUB_OUTPUT" || echo "hit=1" >> "$GITHUB_OUTPUT"
      - name: 上傳 SARIF → code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with: { sarif_file: gitleaks.sarif, category: gitleaks }
      - name: Gate（命中密鑰 → fail）
        run: '[ "${{ steps.gl.outputs.hit }}" = "0" ] || { echo "✗ 命中密鑰"; exit 1; }'

  # ───────────────── Dependency review（PR 時擋新引入的漏洞/壞 license 依賴）─────────────────
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:                 # 最小權限：只此 job 需要寫 PR 留言
      contents: read             #   讀 dependency graph / diff
      pull-requests: write       #   comment-summary-in-pr 貼摘要
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ───────────────── Dependency policy gate（宣告依賴 ⊆ dep-policy 白名單）─────────────────
  # 比對「pom / package-lock 解析出的依賴座標」vs security-team/dep-policy 的 allow-list，
  # 不在清單即 exit 1 擋下。白名單的唯一真實來源是獨立的 dep-policy repo。
  dep-policy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout dep-policy（allow-list 唯一真實來源）
        uses: actions/checkout@v4
        with:
          repository: ryanGTR/dep-policy
          path: .dep-policy

      - name: 裝 Java 21（給 mvn dependency:list 用；mvn 為 runner 預裝）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gate — backend（pom 依賴 ⊆ maven-approved.yaml）
        env:
          USE_HOST_TOOLS: '1'
          POLICY_DIR: ${{ github.workspace }}/.dep-policy
        run: ./scripts/dep-policy-check.sh backend

      - name: Gate — frontend（package-lock ⊆ npm-approved.yaml）
        env:
          POLICY_DIR: ${{ github.workspace }}/.dep-policy
        run: ./scripts/dep-policy-check.sh frontend

      - name: Gate — dotnet（packages.lock ⊆ nuget-approved.yaml）
        env:
          POLICY_DIR: ${{ github.workspace }}/.dep-policy
        run: ./scripts/dep-policy-check.sh nuget

  # ───────────────── Mend-style gate（policy-based / default-allow，模擬 Mend）─────────────────
  # 開源工具仿 Mend：Trivy discovery 全元件(含 transitive) → vuln+license 掃描 →
  # 套 mend-sim/mend-policy.yaml（命中 reject 政策才擋）。對比 dep-policy-gate 的 default-deny 白名單。
  # 詳見 docs/mend-style-vs-allowlist.md。
  mend-style-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 裝 PyYAML（政策評估器用）
        run: pip install --quiet pyyaml

      - name: Mend-style 掃描 + 政策評估（backend + frontend + dotnet）
        run: ./scripts/mend-style-scan.sh all

      - name: 上傳 Mend-style inventory 報告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mend-inventory
          path: /tmp/mend-sim/mend-inventory.md

  # ───────────────── Build → SBOM → Scan → Sign ─────────────────
  build-scan-sign:
    needs: [sast, secrets, dep-policy-gate, mend-style-gate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend, dotnet]
    steps:
      - uses: actions/checkout@v4

      - name: 小寫 image 名
        id: img
        run: echo "name=$(echo "$IMAGE_PREFIX/${{ matrix.component }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: 登入 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push → GHCR
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.sha }}
            ${{ steps.img.outputs.name }}:latest
          provenance: false

      - name: SBOM（Syft → CycloneDX）
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.component }}.json
          upload-artifact: true

      - name: Scan（Trivy → SARIF）
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: HIGH,CRITICAL

      - name: 上傳 Trivy SARIF → code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

      - name: 裝 cosign
        uses: sigstore/cosign-installer@v3

      - name: 簽章 + attestation（cosign keyless）
        env:
          IMG: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "$IMG"
          cosign attest --yes --predicate sbom-${{ matrix.component }}.json --type cyclonedx "$IMG"
          echo "✓ 已簽章 + 綁 SBOM attestation：$IMG"

      - name: SLSA build provenance（GitHub artifact attestation，達 SLSA Build L3）
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ steps.img.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
